<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>КАКАО — Кофе и Завтраки</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: sans-serif;
      background: #fff3bd;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #652a29;
      border-radius: 24px;
      padding: 32px 24px;
      max-width: 340px;
      width: 100%;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .logo {
      width: 180px;
      height: auto;
      margin: 0 auto;
    }
    .subtitle {
      color: #fff3bd;
      font-size: 13px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0.85;
      margin-top: -12px;
    }
    .highlight {
      border-radius: 14px;
      padding: 16px;
      font-size: 15px;
      font-weight: 600;
      line-height: 1.5;
      background: #fff3bd;
      color: #652a29;
      transition: background 0.3s, color 0.3s;
    }
    a.btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #fff3bd;
      color: #652a29;
      padding: 16px 20px;
      border-radius: 50px;
      text-decoration: none;
      font-size: 18px;
      font-weight: 700;
    }
    .btn-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 2px solid #652a29;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="logo.png" alt="КАКАО" class="logo">
    <p class="subtitle">Кофе и Завтраки</p>
    <div class="highlight">
      Проверяем доступность сайта...
    </div>
    <a href="https://kakao.com.tm" class="btn">
      <span>Перейти в меню</span>
      <span class="btn-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="#652a29" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
    </a>
  </div>
  <script>
    function checkSite() {
      fetch('https://kakao.com.tm', { mode: 'no-cors', signal: AbortSignal.timeout(5000) })
        .then(() => {
          document.querySelector('.highlight').innerHTML = '✓ Сайт доступен! Нажмите кнопку ниже';
          document.querySelector('.highlight').style.background = '#2ecc71';
          document.querySelector('.highlight').style.color = '#fff';
        })
        .catch(() => {
          document.querySelector('.highlight').innerHTML = '✗ Сайт недоступен — отключите VPN и обновите страницу';
          document.querySelector('.highlight').style.background = '#fff3bd';
          document.querySelector('.highlight').style.color = '#652a29';
        });
    }
    checkSite();
    setInterval(checkSite, 3000);
  </script>
</body>
</html>
