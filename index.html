<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>КАКАО — Кофе и Завтраки</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: sans-serif;
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #fff3bd;
      border: 1.5px solid #652a29;
      border-radius: 40px;
      box-shadow: 0 4px 4px rgba(0,0,0,0.25);
      padding: 32px 24px;
      max-width: 350px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    .logo {
      width: 100%;
      height: auto;
    }
    .highlight {
      width: 100%;
      border: 2px solid #9f2020;
      border-radius: 10px;
      padding: 16px;
      font-size: 16px;
      font-weight: 700;
      line-height: 1.5;
      background: white;
      color: #652a29;
      text-align: center;
      transition: background 0.3s, color 0.3s, border-color 0.3s;
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    a.btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #fff3bd;
      color: #652a29;
      padding: 12px 16px 12px 20px;
      border-radius: 100px;
      border: 1.5px solid #652a29;
      text-decoration: none;
      font-size: 20px;
      font-weight: 700;
      box-shadow: 0 4px 6px rgba(101,42,41,0.5);
    }
    .btn-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: white;
      border: 1.5px solid #652a29;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    a.btn:focus {
     outline: none;
     }

    a.btn:active {
     opacity: 0.85;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      15% { transform: translateX(-8px); }
      30% { transform: translateX(8px); }
      45% { transform: translateX(-6px); }
      60% { transform: translateX(6px); }
      75% { transform: translateX(-4px); }
      90% { transform: translateX(4px); }
    }
    .shake {
      animation: shake 0.5s ease;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="logo.png" alt="КАКАО" class="logo">
    <div class="highlight" id="status">
      Проверяем доступность сайта...
    </div>
    <a href="https://kakao.com.tm" class="btn" id="btn">
      <span>Перейти в меню</span>
      <span class="btn-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="#652a29" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
    </a>
  </div>
  <script>
    const el = document.getElementById('status');
    const btn = document.getElementById('btn');
    let siteAvailable = false;

    function shake() {
      el.classList.remove('shake');
      void el.offsetWidth;
      el.classList.add('shake');
    }

    function setUnavailable() {
      siteAvailable = false;
      el.innerHTML = '✗ Сайт недоступен — отключите VPN и обновите страницу';
      el.style.background = 'white';
      el.style.color = '#652a29';
      el.style.borderColor = '#9f2020';
    }

    function setAvailable() {
      siteAvailable = true;
      el.innerHTML = '✓ Сайт доступен! Нажмите кнопку ниже';
      el.style.background = '#2ecc71';
      el.style.color = '#fff';
      el.style.borderColor = '#2ecc71';
    }

    // Клик на кнопку — если сайт недоступен, трясём блок статуса
    btn.addEventListener('click', function(e) {
      if (!siteAvailable) {
        e.preventDefault();
        shake();
      }
    });

    // При загрузке — редирект если сайт доступен
    fetch('https://kakao.com.tm', { mode: 'no-cors', signal: AbortSignal.timeout(3000) })
      .then(() => {
        window.location.href = 'https://kakao.com.tm';
      })
      .catch(() => {
        setUnavailable();

        // Периодическая проверка каждые 3 секунды
        setInterval(() => {
          fetch('https://kakao.com.tm', { mode: 'no-cors', signal: AbortSignal.timeout(5000) })
            .then(() => setAvailable())
            .catch(() => setUnavailable());
        }, 3000);
      });
  </script>
</body>
</html>
