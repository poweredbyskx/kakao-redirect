<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>КАКАО — Кофе и Завтраки</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: sans-serif;
      background: #fff3bd;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #652a29;
      border-radius: 20px;
      padding: 32px 24px;
      max-width: 380px;
      width: 100%;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    h1 {
      color: #fff3bd;
      font-size: 28px;
      letter-spacing: 0.1em;
    }
    p {
      color: #fff3bd;
      font-size: 15px;
      line-height: 1.6;
      opacity: 0.9;
    }
    .highlight {
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 600;
      line-height: 1.6;
      background: #fff3bd;
      color: #652a29;
      transition: background 0.3s, color 0.3s;
    }
    a.btn {
      display: block;
      background: #fff3bd;
      color: #652a29;
      padding: 14px;
      border-radius: 14px;
      text-decoration: none;
      font-size: 18px;
      font-weight: 700;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>КАКАО</h1>
    <p>Кофе и Завтраки</p>
    <div class="highlight">
      Проверяем доступность сайта...
    </div>
    <p>Наш сайт работает на локальном сервере и недоступен через VPN</p>
    <a href="https://kakao.com.tm" class="btn">Перейти в меню →</a>
  </div>
  <script>
    function checkSite() {
      fetch('https://kakao.com.tm', { mode: 'no-cors', signal: AbortSignal.timeout(5000) })
        .then(() => {
          document.querySelector('.highlight').innerHTML = '✓ Сайт доступен! Нажмите кнопку ниже';
          document.querySelector('.highlight').style.background = '#2ecc71';
          document.querySelector('.highlight').style.color = '#fff';
        })
        .catch(() => {
          document.querySelector('.highlight').innerHTML = '✗ Сайт недоступен — отключите VPN и обновите страницу';
          document.querySelector('.highlight').style.background = '#fff3bd';
          document.querySelector('.highlight').style.color = '#652a29';
        });
    }
    checkSite();
    setInterval(checkSite, 3000);
  </script>
</body>
</html>
